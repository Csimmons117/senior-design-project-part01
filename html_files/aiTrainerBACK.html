<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>AI Trainer</title>
<link rel="stylesheet" href="../index.css">

<style>
.chat-box {
    height: 420px;
    overflow-y: auto;
    display: flex;
    flex-direction: column;
    padding: 10px;
}

.bubble {
    max-width: 75%;
    padding: 12px;
    margin: 8px;
    border-radius: 10px;
    line-height: 1.6;
    white-space: pre-line;
}

.ai {
    background-color: #111;
    border-left: 4px solid #b30000;
    align-self: flex-start;
}

.user {
    background: linear-gradient(135deg, #b30000, #ff4d4d);
    color: white;
    align-self: flex-end;
}

.chat-input {
    display: flex;
    margin-top: 10px;
}

.chat-input input {
    flex: 1;
    padding: 10px;
}

.option-btn {
    display: inline-block;
    margin: 5px;
    padding: 8px 12px;
    background-color: #b30000;
    border-radius: 6px;
    cursor: pointer;
}

.option-btn:hover {
    background-color: #ff4d4d;
    color: black;
}
</style>
</head>

<body>

<div class="hero">
    <h1>AI Workout Trainer</h1>
    <p>Interactive training assistant</p>
</div>

<div class="layout">

    <aside class="sidebar">
        <nav>
            <a href="../php_files/welcome.php">Dashboard</a>
            <a href="#" class="active">AI Trainer</a>
        </nav>
    </aside>

    <main class="content">
        <h2>Chat Trainer</h2>

        <section class="panel">
            <div id="chat" class="chat-box"></div>

            <div class="chat-input">
                <input id="userInput" placeholder="Type: legs, back, chest...">
                <button onclick="handleInput()">Send</button>
            </div>
        </section>
    </main>

</div>

<footer class="footer">
    <p>© 2026 Student Recreation Center</p>
</footer>

<script>
const chat = document.getElementById("chat");

const workouts = {
back: `BACK WORKOUT:

1. Pull-Ups
Sets: 4
Reps: 8–12

2. Lat Pulldown
Sets: 4
Reps: 10–12

3. Deadlift
Sets: 4
Reps: 5–8

4. Seated Row
Sets: 3
Reps: 10–12
`,

legs: `LEG WORKOUT:

1. Squats
Sets: 4
Reps: 6–10

2. Leg Press
Sets: 4
Reps: 10–12

3. Lunges
Sets: 3
Reps: 10 each leg

4. Romanian Deadlift
Sets: 3
Reps: 8–12
`,

chest: `CHEST WORKOUT:

1. Bench Press
Sets: 4
Reps: 6–10

2. Incline Dumbbell Press
Sets: 4
Reps: 8–12

3. Chest Fly
Sets: 3
Reps: 12–15

4. Push-Ups
Sets: 3
To failure
`,

abs: `AB WORKOUT:

1. Planks
3 sets of 30–60 sec

2. Crunches
3 sets of 15–20

3. Leg Raises
3 sets of 12–15
`,

running: `RUNNING:

• 5 min warm-up
• 30 sec sprint / 1 min walk x8
• 15–20 min steady run
`,

walking: `WALKING:

• 30–45 min brisk pace
• Optional incline treadmill
`
};

const foods = {
bulk: `BULKING:
• Chicken & rice
• Steak & potatoes
• Protein shakes`,
lean: `LEAN:
• Chicken salad
• Turkey wraps
• Egg whites`,
"reduce fat": `FAT LOSS:
• Salmon & veggies
• Quinoa bowls
• Lean stir fry`
};

/* ---------- CORE FUNCTIONS ---------- */

function addMessage(text, type="ai") {
    const bubble = document.createElement("div");
    bubble.className = `bubble ${type}`;
    bubble.textContent = text;
    chat.appendChild(bubble);
    chat.scrollTop = chat.scrollHeight;
}

function typeMessage(text, callback=null) {
    const bubble = document.createElement("div");
    bubble.className = "bubble ai";
    chat.appendChild(bubble);

    let i = 0;
    function typing() {
        bubble.textContent = text.substring(0, i);
        i++;
        chat.scrollTop = chat.scrollHeight;

        if (i <= text.length) {
            setTimeout(typing, 10);
        } else if (callback) {
            callback();
        }
    }
    typing();
}

function clearOptions() {
    document.querySelectorAll(".option-btn").forEach(btn => btn.remove());
}

function addOptions(options) {
    const container = document.createElement("div");

    options.forEach(opt => {
        const btn = document.createElement("span");
        btn.className = "option-btn";
        btn.textContent = opt.label;

        btn.onclick = () => {
            clearOptions();
            opt.action();
        };

        container.appendChild(btn);
    });

    chat.appendChild(container);
}

/* ---------- FLOW CONTROL ---------- */

function restartFlow() {
    typeMessage("\nAnything else you want to train?", () => {
        document.getElementById("userInput").focus();
    });
}

function handleInput() {
    const input = document.getElementById("userInput");
    const text = input.value.toLowerCase().trim();

    if (!text) return;

    addMessage(input.value, "user");
    input.value = "";

    let found = false;

    for (let key in workouts) {
        if (text.includes(key)) {
            found = true;

            typeMessage(
`Analyzing your request...

You want to train your ${key}.

Is that correct?`,
            () => {
                addOptions([
                    {label: "Yes", action: () => confirmWorkout(key)},
                    {label: "No", action: restartFlow}
                ]);
            });

            break;
        }
    }

    if (!found) {
        typeMessage("Try: chest, back, legs, abs, running, walking.");
    }
}

function confirmWorkout(group) {
    typeMessage(`Generating your ${group} workout...\n\n${workouts[group]}`, () => {
        typeMessage("Would you like food recommendations?", () => {
            addOptions([
                {label: "Yes", action: foodChoice},
                {label: "No", action: () => typeMessage("You're all set 💪", restartFlow)}
            ]);
        });
    });
}

function foodChoice() {
    typeMessage("Choose your goal:", () => {
        addOptions([
            {label: "Bulk", action: () => showFood("bulk")},
            {label: "Lean", action: () => showFood("lean")},
            {label: "Reduce Fat", action: () => showFood("reduce fat")}
        ]);
    });
}

function showFood(goal) {
    typeMessage(foods[goal], restartFlow);
}

/* ---------- START ---------- */
typeMessage("Hi 👋\n\nWhat would you like to train today?");
</script>

</body>
</html>
